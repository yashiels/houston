name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "yashiel@skyner.co.za"
          git config user.name "Yashiel Sookdeo"

      - name: Install dependencies
        run: sudo apt-get install -y bats jq

      - name: Run tests
        run: bats tests/

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${NEW}"

          jq --arg v "$NEW" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          jq --arg v "$NEW" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "$NEW" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Bumped: $CURRENT → $NEW (${{ inputs.bump }})"

      - name: Open version bump PR
        run: |
          BRANCH="release/v${{ steps.bump.outputs.version }}"
          git checkout -b "$BRANCH"
          git add package.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: bump version to ${{ steps.bump.outputs.version }}" \
            --body "- Automated version bump (${{ inputs.bump }}): ${{ steps.bump.outputs.tag }}" \
            --head "$BRANCH" \
            --base master \
            --assignee "@me"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
