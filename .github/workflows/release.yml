name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests before release
        run: |
          sudo apt-get install -y bats jq
          git config --global user.email "ci@houston.dev"
          git config --global user.name "Houston CI"
          bats tests/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create plugin archive
        id: archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="houston-${VERSION}.tar.gz"

          tar czf "$ARCHIVE" \
            .claude-plugin/ \
            commands/ \
            hooks/ \
            package.json \
            pipeline/ \
            profiles/ \
            references/ \
            rules/ \
            scripts/ \
            skills/ \
            templates/ \
            CLAUDE.md \
            SKILL.md \
            README.md \
            LICENSE

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "Created $ARCHIVE ($(du -h "$ARCHIVE" | cut -f1))"

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            COMMITS=$(git log --oneline -20)
          else
            COMMITS=$(git log --oneline "${PREV_TAG}..HEAD")
          fi

          cat > release-notes.md << 'NOTES'
          ## What's New
          NOTES

          echo "$COMMITS" | sed 's/^/- /' >> release-notes.md

          cat >> release-notes.md << 'NOTES'

          ## Installation

          **Via Claude Code (recommended):**
          ```bash
          claude plugins marketplace add yashiels/houston
          claude plugins install houston@yashiels
          ```

          **Manual:**
          ```bash
          git clone https://github.com/yashiels/houston.git
          cd houston
          ./scripts/install.sh
          ```
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: ${{ steps.archive.outputs.archive }}
          generate_release_notes: false
