name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests before release
        run: |
          sudo apt-get install -y bats jq
          bats tests/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in plugin manifest
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "${{ steps.version.outputs.version }}" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Create plugin archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="houston-${VERSION}.tar.gz"

          # Include only what's needed for the plugin
          tar czf "$ARCHIVE" \
            .claude-plugin/ \
            commands/ \
            hooks/ \
            package.json \
            pipeline/ \
            profiles/ \
            references/ \
            rules/ \
            scripts/ \
            skills/ \
            templates/ \
            CLAUDE.md \
            SKILL.md \
            README.md \
            LICENSE

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "Created $ARCHIVE ($(du -h "$ARCHIVE" | cut -f1))"
        id: archive

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log --oneline "${PREV_TAG}..HEAD")
          fi

          # Write to file for the release body
          cat > release-notes.md << EOF
          ## Houston v${{ steps.version.outputs.version }}

          ### Changes
          $(echo "$COMMITS" | sed 's/^/- /')

          ### Installation

          **Via Claude Code (recommended):**
          \`\`\`bash
          claude plugins marketplace add yashiels/houston
          claude plugins install houston@yashiels
          \`\`\`

          **Manual:**
          \`\`\`bash
          git clone https://github.com/yashiels/houston.git
          cd houston
          ./scripts/install.sh
          \`\`\`

          **From archive:**
          \`\`\`bash
          tar xzf houston-${{ steps.version.outputs.version }}.tar.gz -C ~/.houston/repo
          ~/.houston/repo/scripts/install.sh
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: ${{ steps.archive.outputs.archive }}
          generate_release_notes: false
