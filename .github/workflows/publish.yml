name: Publish

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    # Only run when a version bump commit lands on master
    if: startsWith(github.event.head_commit.message, 'chore: bump version to')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "yashiel@skyner.co.za"
          git config user.name "Yashiel Sookdeo"

      - name: Extract version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Houston ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create archive
        id: archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="houston-${VERSION}.tar.gz"

          tar czf "$ARCHIVE" \
            .claude-plugin/ \
            commands/ \
            hooks/ \
            package.json \
            pipeline/ \
            profiles/ \
            references/ \
            rules/ \
            scripts/ \
            skills/ \
            templates/ \
            CLAUDE.md \
            SKILL.md \
            README.md \
            LICENSE

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ steps.version.outputs.tag }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline -20)
          else
            COMMITS=$(git log --oneline "${PREV_TAG}..${{ steps.version.outputs.tag }}")
          fi

          cat > release-notes.md << 'NOTES'
          ## What's New
          NOTES

          echo "$COMMITS" | sed 's/^/- /' >> release-notes.md

          cat >> release-notes.md << 'NOTES'

          ## Install / Update

          ```bash
          claude plugins marketplace add yashiels/houston
          claude plugins install houston@yashiels
          ```

          Or update existing:
          ```bash
          claude plugins marketplace update yashiels
          claude plugins update houston@yashiels
          ```
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Houston ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: ${{ steps.archive.outputs.archive }}
