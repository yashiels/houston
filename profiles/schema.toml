# Houston Profile Schema
# Each profile defines a complete development context.
# Fields marked [required] must be present; others are optional.

[profile]
name = ""           # [required] Unique profile identifier
priority = 0        # [required] Higher wins on ambiguous detection
type = ""           # [optional] "agent" or "human" — omit for human profiles
type = ""           # [optional] "agent" or "human" — omit for human profiles

[identity]
name = ""           # [required] Git author name
email = ""          # [required] Git author email
git_user = ""       # [required] GitHub/GitLab username

[linear]
api_key_env = ""    # [required] Env var name containing Linear API key
org = ""            # [required] Linear organization name
default_team = ""   # [required] Default Linear team for new tickets
teams = []          # Teams the user works on (for ticket prefix detection)

[owners]
users = []          # [agent profiles only] human git users this agent works under

[platforms.github]
orgs = []           # GitHub org names this profile covers

[platforms.gitlab]
orgs = []           # GitLab org/group names this profile covers

[owners]
users = []          # [agent profiles only] human git users this agent works under

[reviewers.github]
# "org/repo-pattern" = ["user1", "user2"]

[reviewers.gitlab]
# "repo-pattern" = ["user1", "user2"]

[conventions.gitlab.org_name]
# Per-org conventions enforced before PR/MR creation
changelog = false       # Require CHANGELOG.md entry (keep a changelog format)
lib_bump_check = false  # Check if shared libs changed, require version bump + note in MR

[detect]
remote_patterns = [] # [required] Substrings to match in git remote URLs
